.overlay {
  position: fixed; inset: 0;
  background: linear-gradient(180deg, rgba(10,8,30,0.6) 0%, rgba(10,8,30,0.5) 100%);
  z-index: 1;
}

.app {
  position: relative; z-index: 2;
  padding: 0.75rem;
  max-width: 420px;
  margin: 0 auto;
}

.top-nav { display: flex; gap: 6px; margin-bottom: 12px; }
.tab-btn {
  flex: 1; padding: 8px 4px;
  border-radius: 8px;
  border: 0.5px solid rgba(127,119,221,0.4);
  background: rgba(20,15,50,0.65);
  color: rgba(240,238,252,0.6);
  font-family: 'DM Sans', sans-serif;
  font-size: 12px; cursor: pointer; transition: all 0.15s;
  backdrop-filter: blur(8px);
}
.tab-btn.active {
  background: var(--p); border-color: var(--p);
  color: white; font-weight: 500;
}
.section { display: none; }
.section.visible { display: block; }

.glass {
  background: rgba(20,15,50,0.7);
  border: 0.5px solid rgba(127,119,221,0.25);
  border-radius: 16px;
  backdrop-filter: blur(10px);
}

.challenge-card { padding: 1rem 1.125rem; margin-bottom: var(--gap); }
.challenge-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
.cat-badge {
  font-size: 11px; padding: 2px 8px; border-radius: 100px;
  background: rgba(127,119,221,0.2); color: #c8c4f8;
  border: 0.5px solid rgba(127,119,221,0.4);
}
.win-type { font-size: 11px; color: rgba(240,238,252,0.5); }
.challenge-num { margin-left: auto; font-size: 13px; color: rgba(240,238,252,0.45); }
.challenge-title { font-size: 20px; font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.03em; color: #f0eefc; margin-bottom: 6px; line-height: 1.15; }
.challenge-desc { font-size: 13px; color: rgba(240,238,252,0.7); line-height: 1.55; margin-bottom: 10px; }
.challenge-footer { display: flex; gap: 6px; align-items: center; }
.time-chip {
  font-size: 11px; padding: 3px 8px; border-radius: 8px;
  background: rgba(127,119,221,0.12); color: rgba(240,238,252,0.55);
  border: 0.5px solid rgba(127,119,221,0.2);
}
.diff-dots { display: flex; gap: 3px; align-items: center; margin-left: auto; }
.dd { width: 7px; height: 7px; border-radius: 50%; background: rgba(127,119,221,0.15); }
.dd.on { background: var(--p); }

.nav-row { display: flex; gap: 8px; align-items: center; margin-bottom: var(--gap); }
.nav-btn {
  width: 42px; height: 42px; border-radius: 50%;
  border: 0.5px solid rgba(127,119,221,0.35);
  background: rgba(20,15,50,0.65);
  color: #f0eefc; font-size: 18px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
}
.nav-btn:hover { background: rgba(127,119,221,0.25); }
.nav-btn:disabled { opacity: 0.22; cursor: not-allowed; }
.random-btn {
  flex: 1; height: 42px; border-radius: 8px;
  background: var(--p); border: none; color: white;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px; font-weight: 700; cursor: pointer;
  transition: background 0.15s;
}
.random-btn:hover { background: var(--p2); }

.filter-row { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }
.fpill {
  font-size: 11px; padding: 4px 10px; border-radius: 100px;
  border: 0.5px solid rgba(127,119,221,0.3);
  background: rgba(20,15,50,0.55);
  color: rgba(240,238,252,0.55); cursor: pointer; transition: all 0.15s;
}
.fpill.active { background: var(--p); border-color: var(--p); color: white; }

.log-label { font-size: 12px; color: rgba(240,238,252,0.55); margin-bottom: 6px; font-weight: 500; }
.result-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.r-field { display: flex; flex-direction: column; gap: 4px; }
.r-field label { font-size: 11px; color: rgba(240,238,252,0.55); }
.r-field input, .note-input {
  padding: 7px 10px; font-size: 14px; border-radius: 8px;
  border: 0.5px solid rgba(127,119,221,0.3);
  background: rgba(10,8,30,0.6); color: #f0eefc;
  font-family: 'DM Sans', sans-serif;
  width: 100%;
}
.note-input { margin-bottom: 8px; }
.save-btn {
  width: 100%; height: 38px; border-radius: 8px;
  background: var(--p); border: none; color: white;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px; font-weight: 700; cursor: pointer;
}
.save-btn:hover { background: var(--p2); }
.save-msg { font-size: 12px; color: #5DCAA5; text-align: center; margin-top: 4px; display: none; }

.score-card {
  background: rgba(127,119,221,0.12);
  border: 0.5px solid rgba(127,119,221,0.3);
  border-radius: 16px; padding: 1rem; margin-bottom: var(--gap);
}
.score-grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: 8px; align-items: center; margin-bottom: 10px; }
.score-player { text-align: center; }
.score-name { font-size: 12px; color: #c8c4f8; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; }
.score-num { font-family: 'Bebas Neue', sans-serif; font-size: 42px; color: white; line-height: 1; }
.score-vs { font-size: 14px; color: rgba(200,196,248,0.4); text-align: center; }
.score-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.s-btn {
  padding: 7px; border-radius: 8px;
  border: 0.5px solid rgba(127,119,221,0.3);
  background: rgba(127,119,221,0.1); color: #c8c4f8;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px; cursor: pointer; transition: background 0.15s;
}
.s-btn:hover { background: rgba(127,119,221,0.25); }
.s-btn.reset-s { grid-column: 1/-1; background: transparent; border-color: transparent; color: rgba(200,196,248,0.4); font-size: 11px; }

.history-item {
  background: rgba(20,15,50,0.7);
  border: 0.5px solid rgba(127,119,221,0.18);
  border-radius: 10px; padding: 10px 12px;
  margin-bottom: 6px;
}
.hi-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.hi-title { font-size: 13px; font-weight: 500; color: #f0eefc; flex: 1; }
.hi-date { font-size: 11px; color: rgba(240,238,252,0.35); }
.hi-results { display: flex; gap: 12px; }
.hi-player { font-size: 12px; color: rgba(240,238,252,0.5); }
.hi-player span { color: #f0eefc; font-weight: 500; }
.hi-winner { font-size: 11px; padding: 2px 7px; border-radius: 100px; background: rgba(127,119,221,0.18); color: #c8c4f8; border: 0.5px solid rgba(127,119,221,0.3); }
.hi-note { font-size: 11px; color: rgba(240,238,252,0.4); margin-top: 4px; font-style: italic; }
.no-history { font-size: 13px; color: rgba(240,238,252,0.4); text-align: center; padding: 2rem 0; }

.section-title { font-size: 11px; font-weight: 500; color: rgba(240,238,252,0.45); margin-bottom: 8px; letter-spacing: 0.12em; text-transform: uppercase; }
.stat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: var(--gap); }
.stat-box { background: rgba(20,15,50,0.6); border-radius: 8px; padding: 10px 12px; border: 0.5px solid rgba(127,119,221,0.15); }
.stat-label { font-size: 11px; color: rgba(240,238,252,0.45); margin-bottom: 2px; }
.stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: #f0eefc; }

.cloud-dot { width: 6px; height: 6px; border-radius: 50%; background: #1D9E75; display: inline-block; }
.cloud-dot.loading { background: #BA7517; }

.progress-bar { height: 2px; background: rgba(127,119,221,0.12); border-radius: 1px; margin-bottom: 10px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--p); border-radius: 1px; transition: width 0.3s; }

.header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.app-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 0.05em; color: #f0eefc; }
.app-sub { font-size: 10px; color: rgba(240,238,252,0.45); text-transform: uppercase; letter-spacing: 0.15em; }
.cloud-status { display: flex; align-items: center; gap: 6px; font-family: 'DM Sans', sans-serif; font-size: 11px; color: rgba(240,238,252,0.45); }
</style>
</head>

    </div>

const cats=["tutte","stazione gara","mix","corsa","corpo libero","speciale"];
const winLabel={tempo:"⏱ Tempo",reps:"🔢 Reps",distanza:"📏 Distanza","last standing":"👑 Last standing",watt:"⚡ Watt",tecnica:"🎯 Tecnica",precisione:"🎯 Precisione"};
const catEmoji={"stazione gara":"🏟️",mix:"🔥",corsa:"🏃","corpo libero":"💪",speciale:"⭐"};

let filtered=[...C],idx=0,scores={kiki:0,cris:0},history=[];

function switchTab(t) {
  ['sfide','punteggi','storico'].forEach(s=>document.getElementById('tab-'+s).classList.toggle('visible',s===t));
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',['sfide','punteggi','storico'][i]===t));
  if(t==='punteggi') renderStats();
  if(t==='storico') renderHistory();
}

function buildFilters() {
  document.getElementById('filterRow').innerHTML=cats.map(c=>`<button class="fpill${c==='tutte'?' active':''}" data-cat="${c}" onclick="setFilter('${c}')">${catEmoji[c]||''} ${c}</button>`).join('');
}

function setFilter(cat) {
  filtered=cat==='tutte'?[...C]:C.filter(c=>c.cat===cat);
  idx=0;
  document.querySelectorAll('.fpill').forEach(b=>b.classList.toggle('active',b.dataset.cat===cat));
  renderCard();
}

function renderCard() {
  const c=filtered[idx];
  if(!c) return;
  document.getElementById('cCat').textContent=(catEmoji[c.cat]||'')+' '+c.cat;
  document.getElementById('cWin').textContent=winLabel[c.win]||c.win;
  document.getElementById('cNum').textContent=(idx+1)+'/'+filtered.length;
  document.getElementById('cTitle').textContent=c.title;
  document.getElementById('cDesc').textContent=c.desc;
  document.getElementById('cTime').textContent='⏰ '+c.time;
  document.getElementById('cDiff').innerHTML=Array.from({length:3},(_,i)=>`<div class="dd${i<c.diff?' on':''}"></div>`).join('');
  document.getElementById('progFill').style.width=((idx+1)/filtered.length*100)+'%';
  document.getElementById('prevBtn').disabled=idx===0;
  document.getElementById('nextBtn').disabled=idx===filtered.length-1;
  document.getElementById('resKiki').value='';
  document.getElementById('resCris').value='';
  document.getElementById('resNote').value='';
  document.getElementById('saveMsg').style.display='none';
}

function navigate(dir) { idx=Math.max(0,Math.min(filtered.length-1,idx+dir)); renderCard(); }
function randomChallenge() { idx=Math.floor(Math.random()*filtered.length); renderCard(); }

function determineWinner(winType,vK,vC) {
  if(!vK||!vC) return vK?'kiki':vC?'cris':null;
  if(['reps','distanza','watt'].includes(winType)) {
    const nK=parseFloat(vK),nC=parseFloat(vC);
    if(!isNaN(nK)&&!isNaN(nC)) return nK>nC?'kiki':nC>nK?'cris':'pari';
  }
  if(winType==='tempo') {
    const toSec=s=>{const p=s.split(':');return p.length===2?parseInt(p[0])*60+parseFloat(p[1]):parseFloat(s);};
    const nK=toSec(vK),nC=toSec(vC);
    if(!isNaN(nK)&&!isNaN(nC)) return nK<nC?'kiki':nC<nK?'cris':'pari';
  }
  return null;
}

async function saveResult() {
  const c=filtered[idx];
  const resK=document.getElementById('resKiki').value.trim();
  const resC=document.getElementById('resCris').value.trim();
  if(!resK&&!resC) return;
  const winner=determineWinner(c.win,resK,resC);
  const entry={challenge:c.title,cat:c.cat,win:c.win,kiki:resK,cris:resC,winner,note:document.getElementById('resNote').value.trim(),date:new Date().toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit'})};
  if(winner==='kiki') scores.kiki++;
  if(winner==='cris') scores.cris++;
  history.unshift(entry);
  await saveToCloud();
  document.getElementById('saveMsg').style.display='block';
  setTimeout(()=>{document.getElementById('saveMsg').style.display='none';},2000);
  renderScores();
}

function addScore(who) { scores[who]++; saveToCloud(); renderScores(); }
function resetScores() { scores={kiki:0,cris:0}; saveToCloud(); renderScores(); }
function renderScores() { document.getElementById('scoreK').textContent=scores.kiki; document.getElementById('scoreC').textContent=scores.cris; }

function renderStats() {
  renderScores();
  document.getElementById('statTotal').textContent=history.length;
  document.getElementById('statLast').textContent=history.length?history[0].date:'–';
  const catsUsed=[...new Set(history.map(h=>h.cat))];
  const el=document.getElementById('catStats');
  if(!history.length) { el.innerHTML='<div class="no-history">Nessun risultato ancora</div>'; return; }
  el.innerHTML=catsUsed.map(cat=>{
    const items=history.filter(h=>h.cat===cat);
    const wK=items.filter(h=>h.winner==='kiki').length;
    const wC=items.filter(h=>h.winner==='cris').length;
    return `<div class="history-item"><div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span style="font-size:12px;font-weight:500;color:#f0eefc">${catEmoji[cat]||''} ${cat}</span><span style="font-size:11px;color:rgba(240,238,252,0.4);margin-left:auto">${items.length} sfide</span></div><div style="display:flex;gap:16px"><span style="font-size:12px;color:rgba(240,238,252,0.5)">Kiki: <strong style="color:#f0eefc">${wK}</strong></span><span style="font-size:12px;color:rgba(240,238,252,0.5)">Cris: <strong style="color:#f0eefc">${wC}</strong></span></div></div>`;
  }).join('');
}

function renderHistory() {
  const el=document.getElementById('historyList');
  if(!history.length) { el.innerHTML='<div class="no-history">Nessuna sfida registrata ancora</div>'; return; }
  el.innerHTML=history.map(h=>{
    const wBadge=h.winner?`<span class="hi-winner">${h.winner==='pari'?'Pari':h.winner==='kiki'?'Kiki 🏆':'Cris 🏆'}</span>`:'';
    return `<div class="history-item"><div class="hi-header"><div class="hi-title">${h.challenge}</div>${wBadge}<div class="hi-date">${h.date}</div></div><div class="hi-results">${h.kiki?`<div class="hi-player">Kiki: <span>${h.kiki}</span></div>`:''}&nbsp;${h.cris?`<div class="hi-player">Cris: <span>${h.cris}</span></div>`:''}</div>${h.note?`<div class="hi-note">${h.note}</div>`:''}</div>`;
  }).join('');
}

function clearHistory() { if(!confirm('Cancellare tutto lo storico?')) return; history=[]; saveToCloud(); renderHistory(); }

async function saveToCloud() {
  try {
    await window.storage.set('kikiCrisScores',JSON.stringify(scores),true);
    await window.storage.set('kikiCrisHistory',JSON.stringify(history),true);
  } catch(e){}
}

async function loadFromCloud() {
  try {
    const sRes=await window.storage.get('kikiCrisScores',true);
    const hRes=await window.storage.get('kikiCrisHistory',true);
    if(sRes) scores=JSON.parse(sRes.value);
    if(hRes) history=JSON.parse(hRes.value);
  } catch(e){}
  document.getElementById('cloudDot').className='cloud-dot';
  document.getElementById('cloudLabel').textContent='Sync attivo';
  renderScores();
}

buildFilters(); renderCard(); loadFromCloud();
</script>
</body>
</html>
